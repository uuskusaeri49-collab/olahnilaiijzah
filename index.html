<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col">

    <!-- REACT COMPONENTS & LOGIC -->
    <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // DATA AWAL (MOCK DATA) LENGKAP & REALISTIS
    // ==========================================
    const DEFAULT_SISWA = [
      { id: '1', nama: 'ACHMAD FAUZI', nis: '202101054', nisn: '0123456781', jk: 'L', tempatLahir: 'Bandung', tanggalLahir: '2014-04-12', namaAyah: 'Sulaeman', namaIbu: 'Halimah', alamat: 'Kampung Sukamaju RT 01 RW 03', rombel: 'Kelas VI', foto: '' },
      { id: '2', nama: 'BUDI SANTOSO', nis: '202101055', nisn: '0123456782', jk: 'L', tempatLahir: 'Bandung', tanggalLahir: '2014-08-22', namaAyah: 'Kurnia', namaIbu: 'Siti Rahma', alamat: 'Jl. Tanjungkarya Indah No. 12', rombel: 'Kelas VI', foto: '' },
      { id: '3', nama: 'YAYU PANI RAHAYU', nis: '202101052', nisn: '0144145493', jk: 'P', tempatLahir: 'Bandung', tanggalLahir: '2014-05-15', namaAyah: 'Dadang Hermawan', namaIbu: 'Yuyun Lestari', alamat: 'Perum Gading Tutuka Blok C5', rombel: 'Kelas VI', foto: '' },
      { id: '4', nama: 'YENI NURAJIZAH', nis: '202101053', nisn: '3130480394', jk: 'P', tempatLahir: 'Garut', tanggalLahir: '2014-11-05', namaAyah: 'Mulyana', namaIbu: 'Cicih Sutisna', alamat: 'Kp. Bojongsoang No. 88', rombel: 'Kelas VI', foto: '' },
      { id: '5', nama: 'ZULFA NUR MAULIDA', nis: '202101054', nisn: '0149599453', jk: 'P', tempatLahir: 'Bandung', tanggalLahir: '2014-01-30', namaAyah: 'Asep', namaIbu: 'Siti', alamat: 'Perumahan Indah RT 02/05', rombel: 'Kelas VI', foto: '' },
      { id: '6', nama: 'ZULFI ALMUZAQI', nis: '202101055', nisn: '0134629438', jk: 'L', tempatLahir: 'Jakarta', tanggalLahir: '2013-12-15', namaAyah: 'Bambang Prasetyo', namaIbu: 'Sri Wahyuni', alamat: 'Kp. Cigondewah Hilir RT 02/05', rombel: 'Kelas VI', foto: '' }
    ];

    const DEFAULT_MAPEL = [
      { id: 'M01', kode: 'Agama', nama: 'Pendidikan Agama dan Budi Pekerti' },
      { id: 'M02', kode: 'PP', nama: 'Pendidikan Pancasila dan Kewarganegaraan' },
      { id: 'M03', kode: 'B Ind', nama: 'Bahasa Indonesia' },
      { id: 'M04', kode: 'Mat', nama: 'Matematika' },
      { id: 'M05', kode: 'IPAS', nama: 'Ilmu Pengetahuan Alam dan Sosial' },
      { id: 'M06', kode: 'PJOK', nama: 'Pendidikan Jasmani, Olahraga, dan Kesehatan' },
      { id: 'M07', kode: 'SB', nama: 'Seni Budaya dan Prakarya' },
      { id: 'M08', kode: 'B. Inggris', nama: 'Bahasa Inggris' },
      { id: 'M09', kode: 'B Sund', nama: 'Muatan Lokal Bahasa Sunda' }
    ];

    // =========================================================
    // FUNGSI HELPER GLOBAL (DI LUAR KOMPONEN UNTUK MENCEGAH TDZ)
    // =========================================================
    const bulatkanDuaDesimal = (val) => {
      return Math.round((val + Number.EPSILON) * 100) / 100;
    };

    // FUNGSI HELPER BARU: Pembulatan ke 1 desimal terdekat untuk Hasil Akhir dan Rata-rata
    const bulatkanSatuDesimal = (val) => {
      return Math.round((val + Number.EPSILON) * 10) / 10;
    };

    const getSubPenilaianLabel = (subKey) => {
      switch (subKey) {
        case 'k5s1': return 'Kelas 5 Semester 1';
        case 'k5s2': return 'Kelas 5 Semester 2';
        case 'k6s1': return 'Kelas 6 Semester 1';
        case 'k6s2': return 'Kelas 6 Semester 2';
        case 'asaj': return 'ASAJ (Asesmen Sumatif Akhir Tulis)';
        case 'praktek': return 'ASAJ (Praktek)';
        case 'kehadiran': return 'Kehadiran K5-K6 (Total 2 Tahun)';
        case 'nomor_ijazah': return 'Nomor Ijazah';
        default: return '';
      }
    };

    const generateInitialGrades = (siswaList, mapelList) => {
      const grades = {};
      siswaList.forEach(siswa => {
        grades[siswa.id] = {};
        mapelList.forEach(mapel => {
          const isMathOrTheory = mapel.kode === 'Mat' || mapel.kode === 'PP';
          grades[siswa.id][mapel.id] = { 
            k5s1: Math.floor(Math.random() * 15) + 75, 
            k5s2: Math.floor(Math.random() * 15) + 75, 
            k6s1: Math.floor(Math.random() * 15) + 75, 
            k6s2: Math.floor(Math.random() * 15) + 75, 
            asaj: Math.floor(Math.random() * 20) + 70, 
            praktek: isMathOrTheory ? 0 : Math.floor(Math.random() * 20) + 70 
          };
        });
      });
      return grades;
    };

    const generateInitialKehadiran = (siswaList) => {
      const attendance = {};
      siswaList.forEach(siswa => {
        attendance[siswa.id] = Math.floor(Math.random() * 10) + 90;
      });
      return attendance;
    };

    // Helper formal Tanggal Indonesia
    const formatTanggalIndo = (dateStr) => {
      if (!dateStr) return '................';
      const months = [
        'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
        'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
      ];
      const parts = dateStr.split('-');
      if (parts.length === 3) {
        const day = parseInt(parts[2], 10);
        const month = months[parseInt(parts[1], 10) - 1];
        const year = parts[0];
        return `${day} ${month} ${year}`;
      }
      return dateStr;
    };

    function App() {
      // --- STATE UTAMA ---
      const [activeTab, setActiveTab] = useState('dashboard');
      const [subTabRef, setSubTabRef] = useState('sekolah'); 
      const [isPenilaianDropdownOpen, setIsPenilaianDropdownOpen] = useState(false); // DEFAULT CLOSED (HIDE)
      const [isRekapDropdownOpen, setIsRekapDropdownOpen] = useState(false); // DEFAULT REKAP DROPDOWN
      const [isAdministrasiDropdownOpen, setIsAdministrasiDropdownOpen] = useState(false); // DEFAULT ADMIN DROPDOWN
      const [activePenilaianSub, setActivePenilaianSub] = useState('k5s1'); 
      const [activeRekapSub, setActiveRekapSub] = useState('rata_rapor'); // rata_rapor, transkrip, leger
      const [activeAdministrasiSub, setActiveAdministrasiSub] = useState('skl'); // skl, berita_acara, amplop, sk_kelulusan
      const [selectedMapelId, setSelectedMapelId] = useState('M01');
      const [selectedSklSiswaId, setSelectedSklSiswaId] = useState('');

      // Fitur Cetak Massal Baru Sesuai Kesepakatan
      const [isMassPrint, setIsMassPrint] = useState(false);
      const [isSklMassPrint, setIsSklMassPrint] = useState(false);

      // FIX BUG: Menggunakan Fallback Merging Default State Sekolah agar kompatibel dengan data log lama
      const [sekolah, setSekolah] = useState(() => {
        const saved = localStorage.getItem('ijazah_sekolah_ref');
        const defaults = {
          tahunPelajaran: '2025/2026',
          nama: 'SDN 1 TANJUNGKARYA',
          npsn: '20220456',
          kepalaSekolah: 'Agus Saepudin, S.Pd.',
          nip: '196705011988031005',
          waliKelas: 'Siti Aminah, S.Pd.',
          nipWaliKelas: '198503242011012004',
          alamat: 'Jl. Raya Tanjungkarya No. 45',
          kecamatan: 'Mandalawangi',
          kabupaten: 'BANDUNG',
          noRapat: '421.2/089-SD/2026',
          tglRapat: '2026-06-12',
          noKelulusan: '421.2/090/SD-2026',
          tglKelulusan: '2026-06-15',
          noSKK: '421.2/091-SKK/2026',
          tglSKK: '2026-06-15',
          titimangsaTranskrip: 'Garut, 16 Juni 2026',
          kriteriaKelulusan: 75, // KKM Global
          logoKabupaten: '', 
          logoSekolah: ''
        };
        return saved ? { ...defaults, ...JSON.parse(saved) } : defaults;
      });

      const [siswa, setSiswa] = useState(() => {
        const saved = localStorage.getItem('ijazah_siswa_ref');
        return saved ? JSON.parse(saved) : DEFAULT_SISWA;
      });

      const [mapel, setMapel] = useState(() => {
        const saved = localStorage.getItem('ijazah_mapel_ref');
        return saved ? JSON.parse(saved) : DEFAULT_MAPEL;
      });

      const [nilai, setNilai] = useState(() => {
        const saved = localStorage.getItem('ijazah_nilai_ref');
        if (saved) return JSON.parse(saved);
        return generateInitialGrades(DEFAULT_SISWA, DEFAULT_MAPEL);
      });

      const [kehadiran, setKehadiran] = useState(() => {
        const saved = localStorage.getItem('ijazah_kehadiran_ref');
        if (saved) return JSON.parse(saved);
        return generateInitialKehadiran(DEFAULT_SISWA);
      });

      const [nomorIjazah, setNomorIjazah] = useState(() => {
        const saved = localStorage.getItem('ijazah_nomor_ref');
        return saved ? JSON.parse(saved) : {
          '1': 'DN-01/D-SD/K13/2600001',
          '2': 'DN-01/D-SD/K13/2600002',
          '3': 'DN-01/D-SD/K13/2600003',
          '4': 'DN-01/D-SD/K13/2600004',
          '5': 'DN-01/D-SD/K13/2600005',
          '6': 'DN-01/D-SD/K13/2600006'
        };
      });

      const [showSiswaModal, setShowSiswaModal] = useState(false);
      const [editingSiswa, setEditingSiswa] = useState(null);
      const [siswaForm, setSiswaForm] = useState({ 
        nama: '', nis: '', nisn: '', jk: 'L', tempatLahir: '', tanggalLahir: '', namaAyah: '', namaIbu: '', alamat: '', rombel: 'Kelas VI', foto: '' 
      });

      const [showMapelModal, setShowMapelModal] = useState(false);
      const [editingMapel, setEditingMapel] = useState(null);
      const [mapelForm, setMapelForm] = useState({ kode: '', nama: '' });
      const [selectedPrintSiswa, setSelectedPrintSiswa] = useState(null);
      const [notification, setNotification] = useState(null);
      const [showResetConfirm, setShowResetConfirm] = useState(false);

      const showToast = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3000);
      };

      const handlePrint = () => { window.print(); };
      const dapatkanKehadiranSiswa = (siswaId) => kehadiran[siswaId] || 0;

      // Aliases aman untuk mencegah ReferenceError akibat perbedaan gaya panggil pada kode lawas
      const dapatkanKehadiranSiswaLocal = dapatkanKehadiranSiswa;

      // --- LOGIKA HITUNG FORMULA (DIUBAH UNTUK MENUNJANG ATURAN PEMBULATAN BARU) ---
      const hitungRataRataRaporMapel = (siswaId, mapelId) => {
        const dataNilai = nilai[siswaId]?.[mapelId];
        if (!dataNilai) return 0;
        return bulatkanDuaDesimal(((dataNilai.k5s1 || 0) + (dataNilai.k5s2 || 0) + (dataNilai.k6s1 || 0) + (dataNilai.k6s2 || 0)) / 4);
      };

      // Alias Pengaman Mutlak untuk Transkrip dan Leger
      const hitungRataRaporMapel = hitungRataRataRaporMapel;

      const hitungNilAIASAJMapel = (siswaId, mapelId) => {
        const dataNilai = nilai[siswaId]?.[mapelId];
        if (!dataNilai) return 0;
        const tulisVal = dataNilai.asaj || 0;
        const praktekVal = dataNilai.praktek || 0;
        return praktekVal > 0 ? bulatkanDuaDesimal((0.7 * tulisVal) + (0.3 * praktekVal)) : bulatkanDuaDesimal(tulisVal);
      };

      // PENYEMPURNAAN ATURAN BARU: Membulatkan hasil kalkulasi akhir ke 1 desimal terdekat
      const hitungNilaiAkhirIjazah = (siswaId, mapelId) => {
        const rapor = hitungRataRataRaporMapel(siswaId, mapelId);
        const asaj = hitungNilAIASAJMapel(siswaId, mapelId);
        const attend = dapatkanKehadiranSiswa(siswaId);
        const rawScore = (0.4 * rapor) + (0.4 * asaj) + (0.2 * attend);
        return bulatkanSatuDesimal(rawScore);
      };

      // PENYEMPURNAAN ATURAN BARU: Membulatkan rata-rata transkrip ijazah ke 1 desimal terdekat
      const hitungRataRataIjazahSiswa = (siswaId) => {
        let total = 0;
        mapel.forEach(m => { total += hitungNilaiAkhirIjazah(siswaId, m.id); });
        return mapel.length > 0 ? bulatkanSatuDesimal(total / mapel.length) : 0;
      };

      const cekKelulusanSiswa = (siswaId) => {
        let lulus = true;
        mapel.forEach(m => {
          if (hitungNilaiAkhirIjazah(siswaId, m.id) < sekolah.kriteriaKelulusan) lulus = false;
        });
        return lulus;
      };

      // --- LOGIKA PROGRESS TRACKER ---
      const hitungProgresProfil = () => {
        const fields = ['tahunPelajaran', 'nama', 'npsn', 'kepalaSekolah', 'nip', 'waliKelas', 'nipWaliKelas', 'alamat', 'kecamatan', 'kabupaten'];
        return Math.round((fields.filter(f => sekolah[f] && sekolah[f].trim() !== '').length / fields.length) * 100);
      };

      const hitungProgresSK = () => {
        const fields = ['noRapat', 'tglRapat', 'noKelulusan', 'tglKelulusan', 'noSKK', 'tglSKK', 'titimangsaTranskrip'];
        return Math.round((fields.filter(f => sekolah[f] && sekolah[f].trim() !== '').length / fields.length) * 100);
      };

      const hitungProgresSiswa = () => {
        if (siswa.length === 0) return 0;
        const fields = ['nama', 'nis', 'nisn', 'jk', 'tempatLahir', 'tanggalLahir', 'namaAyah', 'namaIbu', 'alamat'];
        let filled = 0;
        siswa.forEach(s => fields.forEach(f => { if (s[f] && String(s[f]).trim() !== '') filled++; }));
        return Math.round((filled / (siswa.length * fields.length)) * 100);
      };

      const hitungProgresNilaiKomponen = (subKey) => {
        if (siswa.length === 0 || mapel.length === 0) return 0;
        let filled = 0;
        siswa.forEach(s => mapel.forEach(m => {
          const score = nilai[s.id]?.[m.id]?.[subKey];
          if (score !== undefined && score !== null && score !== '' && score > 0) filled++;
        }));
        return Math.round((filled / (siswa.length * mapel.length)) * 100);
      };

      const hitungProgresKehadiran = () => {
        if (siswa.length === 0) return 0;
        let filled = 0;
        siswa.forEach(s => { const att = kehadiran[s.id]; if (att !== undefined && att !== null && att !== '' && att > 0) filled++; });
        return Math.round((filled / siswa.length) * 100);
      };

      const hitungProgresNomorIjazah = () => {
        if (siswa.length === 0) return 0;
        let filled = 0;
        siswa.forEach(s => { const num = nomorIjazah[s.id]; if (num && String(num).trim() !== '') filled++; });
        return Math.round((filled / siswa.length) * 100);
      };

      // --- NATIVE EXCEL (.xlsx) HANDLERS ---
      // FIXING REFERENCEERROR: Definisikan handleDownloadTemplateSiswaExcel secara eksplisit di awal App()
      const handleDownloadTemplateSiswaExcel = () => {
        if (typeof window.XLSX === 'undefined') {
          showToast('Engine Excel sedang memuat, mohon tunggu.', 'error');
          return;
        }
        const dataAwal = [
          ["No", "Nama Siswa", "NIS", "NISN", "JK (L/P)", "Tempat Lahir", "Tanggal Lahir (YYYY-MM-DD)", "Nama Ayah", "Nama Ibu", "Alamat", "Rombel"],
          [1, "CONTOH NAMA SISWA", "2021099", "0123456799", "L", "Bandung", "2014-05-15", "Nama Ayah", "Nama Ibu", "Alamat Tinggal", "Kelas VI"]
        ];
        const ws = window.XLSX.utils.aoa_to_sheet(dataAwal);
        const wb = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(wb, ws, "Daftar Siswa");
        window.XLSX.writeFile(wb, "template_biodata_siswa.xlsx");
        showToast('Template Excel Biodata Siswa berhasil diunduh!');
      };

      const handleImportSiswaExcel = (e) => {
        if (typeof window.XLSX === 'undefined') {
          showToast('Engine Excel belum siap, mohon coba kembali.', 'error');
          return;
        }
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = window.XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rawRows = window.XLSX.utils.sheet_to_json(sheet, { header: 1 });

            let importedList = [];
            let currentNilai = {};
            let currentKehadiran = {};
            let currentNomorIjazah = {};
            let insertedCount = 0;

            for (let i = 1; i < rawRows.length; i++) {
              const r = rawRows[i];
              if (!r || r.length < 4) continue;
              const name = String(r[1] || '').toUpperCase().trim();
              if (name === "CONTOH NAMA SISWA" || name === "") continue;

              const nis = String(r[2] || '').trim();
              const sn = String(r[3] || '').trim();
              const jk = String(r[4] || 'L').toUpperCase().trim();
              const tempat = String(r[5] || '').trim();
              let tgl = '';
              if (r[6]) {
                if (typeof r[6] === 'number') {
                  const dObj = window.XLSX.SSF.parse_date_code(r[6]);
                  tgl = `${dObj.y}-${String(dObj.m).padStart(2,'0')}-${String(dObj.d).padStart(2,'0')}`;
                } else {
                  tgl = String(r[6]).trim();
                }
              }
              const ayah = String(r[7] || '').trim();
              const ibu = String(r[8] || '').trim();
              const alamat = String(r[9] || '').trim();
              const rombel = String(r[10] || 'Kelas VI').trim();

              const newId = (Date.now() + insertedCount).toString();
              importedList.push({ id: newId, nama: name, nis, nisn: sn, jk, tempatLahir: tempat, tanggalLahir: tgl, namaAyah: ayah, namaIbu: ibu, alamat, rombel, foto: '' });
              currentNilai[newId] = {};

      const handleMassFotoUpload = (e) => {
        const files = Array.from(e.target.files);

        const readerPromises = files.map(file => {
          return new Promise((resolve) => {
            const filename = file.name;
            const lastDot = filename.lastIndexOf('.');
            const nisnMatch = lastDot !== -1 ? filename.substring(0, lastDot).trim() : filename.trim();

            const targetSiswa = siswa.find(s => s.nisn === nisnMatch);
            if (targetSiswa) {
              const reader = new FileReader();
              reader.onload = (event) => {
                resolve({ id: targetSiswa.id, foto: event.target.result });
              };
              reader.readAsDataURL(file);
            } else {
              resolve(null);
            }
          });
        });

        Promise.all(readerPromises).then(results => {
          const validResults = [];
          for (let i = 0; i < results.length; i++) {
            if (results[i] !== null) {
              validResults.push(results[i]);
            }
          }
          if (validResults.length > 0) {
            setSiswa(prevSiswa => {
              const updated = prevSiswa.map(s => {
                const match = validResults.find(r => r.id === s.id);
                return match ? { ...s, foto: match.foto } : s;
              });
              return updated;
            });
            showToast(`Berhasil mengunggah & mencocokkan ${validResults.length} foto siswa secara massal!`);

            showToast('Tidak ada foto yang cocok dengan NISN siswa yang terdaftar.', 'error');

          });
          filename = `template_nilai_${activePenilaianSub}_${activeMapel.kode.toLowerCase()}.xlsx`;
        }
        const ws = window.XLSX.utils.aoa_to_sheet(rows);
        const wb = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(wb, ws, "Input Nilai");
        window.XLSX.writeFile(wb, filename);
        showToast('Template Excel Penilaian berhasil diunduh!');
      };

      const handleImportNilaiExcel = (e) => {

        const reader = new FileReader();
        reader.onload = (event) => {

                            <div className="self-end w-80 mt-6 pr-4 space-y-1">
                              <p className="font-semibold text-gray-500">Kepada Yth,</p>
                              <p className="font-black text-xs uppercase">Bapak / Ibu Wali dari {targetSiswa.nama}</p>
                              <p className="text-gray-700 text-[10px] whitespace-normal leading-relaxed">
                                Di tempat / Alamat: {targetSiswa.alamat || '...........................................'}
                              </p>
                            </div>

                            {/* Footer kecil */}
                            <div className="flex justify-between items-end text-[7px] text-gray-400 font-mono italic">
                              <p>Administrasi Kelulusan SDN 1 Tanjungkarya - {sekolah.tahunPelajaran}</p>
                              <p className="font-bold text-red-900 uppercase">RAHASIA / PENTING</p>
                            </div>
                          </div>
                        );
                      })()}
                    </div>
                  )}

                </div>
              )}

              {/* KELULUSAN & PRINT */}
              {activeTab === 'kelulusan' && !selectedPrintSiswa && (
                <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden print:hidden animate-fadeIn">
                  <div className="px-5 py-4 bg-gray-50 border-b">
                    <h3 className="font-bold text-gray-800">Verifikasi Kelulusan & Cetak</h3>
                    <p className="text-xs text-gray-500 mt-0.5">Batas kelulusan ketat berdasarkan KKM global ({sekolah.kriteriaKelulusan}). Jika satu nilai mapel kurang, otomatis tidak lulus.</p>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-gray-100 text-gray-500 text-[10px] font-bold uppercase border-b">
                          <th className="px-6 py-3.5">No</th>
                          <th className="px-6 py-3.5">Nama Siswa</th>
                          <th className="px-6 py-3.5">Nomor Ijazah</th>
                          <th className="px-6 py-3.5">Rata Rapor (40%)</th>
                          <th className="px-6 py-3.5 text-center">Rata ASAJ (40%)</th>
                          <th className="px-6 py-3.5 text-center">Kehadiran (20%)</th>
                          <th className="px-6 py-3.5 text-center">Rata Akhir</th>
                          <th className="px-6 py-3.5 text-center">Kelulusan</th>
                          <th className="px-6 py-3.5 text-right">Aksi</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y text-sm">
                        {siswa.map((s, index) => {
                          const rRapor = bulatkanDuaDesimal(mapel.reduce((sum, m) => sum + hitungRataRataRaporMapel(s.id, m.id), 0) / (mapel.length || 1));
                          const rAsaj = bulatkanDuaDesimal(mapel.reduce((sum, m) => sum + hitungNilAIASAJMapel(s.id, m.id), 0) / (mapel.length || 1));
                          const rAkhir = hitungRataRataIjazahSiswa(s.id);
                          const isLulus = cekKelulusanSiswa(s.id);
                          return (
                            <tr key={s.id} className="hover:bg-gray-50">
                              <td className="px-6 py-4">{index + 1}</td>
                              <td className="px-6 py-4 font-mono font-semibold text-red-900 text-xs">{nomorIjazah[s.id] || <span className="text-gray-400 italic font-normal">Belum diisi</span>}</td>
                              <td className="px-6 py-4 font-mono">{rRapor.toFixed(2)}</td>
                              <td className="px-6 py-4 text-center font-mono">{rAsaj.toFixed(2)}</td>
                              <td className="px-6 py-4 text-center font-mono">{dapatkanKehadiranSiswa(s.id).toFixed(2)}</td>
                              <td className="px-6 py-4 text-center font-bold text-red-800">{rAkhir.toFixed(2)}</td>
                              <td className="px-6 py-4 text-center">
                                <span className={`px-3 py-1 rounded-full text-xs font-bold ${isLulus ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}`}>{isLulus ? 'LULUS' : 'TIDAK LULUS'}</span>
                              </td>
                              <td className="px-6 py-4 text-right"><button type="button" onClick={() => setSelectedPrintSiswa(s)} className="px-3.5 py-1.5 bg-red-800 text-white font-semibold text-xs rounded-lg hover:bg-red-950">📄 Buka Transkrip</button></td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* PRINT AREA KOP SURAT (STUDENT INDIVIDUAL TRANSCRIPT - STAYS STRICTLY WITH NO SCHOOL LOGO) */}
              {activeTab === 'kelulusan' && selectedPrintSiswa && (
                <div className="space-y-4 animate-fadeIn pb-12">
                  <div className="bg-white p-4 rounded-xl border flex flex-col sm:flex-row justify-between items-center print:hidden gap-3">
                    <div className="flex gap-2">
                      <button type="button" onClick={() => setSelectedPrintSiswa(null)} className="px-4 py-2 border rounded-lg text-xs font-bold text-gray-700 hover:bg-gray-50">← Kembali</button>
                      <button type="button" onClick={() => setIsMassPrint(false)} className={`px-4 py-2 rounded-lg text-xs font-bold ${!isMassPrint ? 'bg-red-800 text-white' : 'bg-gray-100 text-gray-700'}`}>Cetak Individu</button>
                      <button type="button" onClick={() => setIsMassPrint(true)} className={`px-4 py-2 rounded-lg text-xs font-bold ${isMassPrint ? 'bg-red-800 text-white' : 'bg-gray-100 text-gray-700'}`}>Cetak Massal (Semua Siswa)</button>
                    </div>
                    <div className="flex gap-2">
                      <button type="button" onClick={handlePrint} className="px-5 py-2 bg-emerald-600 text-white font-bold text-xs rounded-lg hover:bg-emerald-700 flex items-center gap-1">🖨️ Cetak Sekarang</button>
                      <button type="button" onClick={() => handleDownloadPDF(isMassPrint ? "Transkrip_Massal" : `Transkrip_${selectedPrintSiswa.nama}`)} className="px-5 py-2 bg-blue-600 text-white font-bold text-xs rounded-lg hover:bg-blue-700 flex items-center gap-1">📥 Unduh PDF</button>
                    </div>
                  </div>

                  {/* Rendering Massal vs Individu murni tanpa redudansi */}
                  {isMassPrint ? (
                    <div className="space-y-8 print:space-y-0">
                      {siswa.map(s => renderTranskripSiswa(s))}
                    </div>
                  ) : (
                    renderTranskripSiswa(selectedPrintSiswa)
                  )}
                </div>
              )}

              {/* BACKUP & RESTORE */}
              {activeTab === 'backup' && (
                <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden print:hidden animate-fadeIn">
                  <div className="px-5 py-4 bg-gray-50 border-b">
                    <h3 className="font-bold text-gray-800">Manajemen Cadangan Data (Backup & Restore)</h3>
                    <p className="text-xs text-gray-500 mt-0.5">Semua data disimpan di dalam memori web browser lokal Anda. Ekspor data secara rutin untuk menghindari kehilangan data.</p>
                  </div>
                  <div className="p-6 space-y-8">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                      <div><h4 className="font-bold text-gray-900 text-sm">Ekspor Seluruh Data ke Lokal</h4><p className="text-xs text-gray-500 mt-1">Unduh semua data siswa, logo, mapel, kehadiran, and nilai dalam format JSON.</p></div>
                      <div className="text-left md:text-right"><button type="button" onClick={exportData} className="px-5 py-3 bg-red-800 text-white text-xs font-bold rounded-lg shadow-sm">💾 Ekspor Cadangan (.json)</button></div>
                    </div>
                    <hr />
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                      <div><h4 className="font-bold text-gray-900 text-sm">Impor / Pulihkan Data Cadangan</h4><p className="text-xs text-gray-500 mt-1">Unggah file cadangan `.json` yang telah Anda simpan sebelumnya.</p></div>
                      <div><label className="block"><input type="file" accept=".json" onChange={importData} className="block w-full text-xs text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-red-50 file:text-red-700 cursor-pointer" /></label></div>
                    </div>
                    <hr />
                    <div className="p-4 bg-red-50 rounded-xl border border-red-100 flex items-center justify-between">
                      <div><h4 className="font-bold text-red-900 text-xs">Atur Ulang ke Pengaturan Awal</h4><p className="text-[10px] text-red-700">Menghapus semua data yang tersimpan di browser ini.</p></div>
                      <button type="button" onClick={() => setShowResetConfirm(true)} className="px-3.5 py-1.5 bg-red-100 text-red-800 text-[11px] font-bold rounded-lg">Reset Data</button>
                    </div>
                  </div>
                </div>
              )}

              {/* DIALOG RESETING KONFIRMASI */}
              {showResetConfirm && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                  <div className="bg-white rounded-2xl shadow-xl w-full max-sm overflow-hidden p-6 text-center space-y-4">
                    <div className="w-16 h-16 bg-red-100 text-red-800 rounded-full flex items-center justify-center text-3xl mx-auto">⚠️</div>
                    <div className="space-y-1">
                      <h3 className="font-bold text-gray-900 text-lg">Hapus Semua Data?</h3>
                      <p className="text-xs text-gray-500">Tindakan ini akan mengosongkan seluruh basis data nilai dan memulihkan data demo bawaan.</p>
                    </div>
                    <div className="flex space-x-2 pt-2">
                      <button type="button" onClick={() => setShowResetConfirm(false)} className="flex-1 py-2 bg-gray-100 text-gray-700 font-semibold text-xs rounded-lg">Batal</button>
                      <button type="button" onClick={executeResetAllData} className="flex-1 py-2 bg-red-800 text-white font-semibold text-xs rounded-lg">Ya, Reset Data</button>
                    </div>
                  </div>
                </div>
              )}

            </main>
          </div>

          {/* FOOTER */}
          <footer className="bg-white border-t border-gray-200 py-6 mt-12 print:hidden">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs text-gray-500">
              <p>Aplikasi e-Ijazah SD | Versi 2026.2.1 • offline-ready</p>
              <p className="mt-1 text-gray-400">Direktorat Sekolah Dasar | Kementerian Pendidikan Dasar dan Menengah</p>
            </div>
          </footer>

        </div>
      );
    }

    // MOUNT TO DOM
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
    </script>
</body>
</html>
